<svg width="1600" height="1000" viewBox="0 0 1600 1000" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="1000" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08111F"/>
      <stop offset="1" stop-color="#132A3A"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10263A" stop-opacity="0.92"/>
      <stop offset="1" stop-color="#183A4D" stop-opacity="0.82"/>
    </linearGradient>
    <radialGradient id="ringGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0.5 0.5) scale(0.7)">
      <stop stop-color="#FFD47A"/>
      <stop offset="0.55" stop-color="#F18F3B"/>
      <stop offset="1" stop-color="#B8401A"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>

  <g opacity="0.18">
    <circle cx="140" cy="120" r="2" fill="white"/>
    <circle cx="220" cy="200" r="3" fill="white"/>
    <circle cx="320" cy="90" r="2" fill="white"/>
    <circle cx="1480" cy="120" r="3" fill="white"/>
    <circle cx="1300" cy="170" r="2" fill="white"/>
    <circle cx="1120" cy="80" r="2" fill="white"/>
    <circle cx="1450" cy="860" r="2" fill="white"/>
    <circle cx="1260" cy="930" r="3" fill="white"/>
    <circle cx="180" cy="880" r="2" fill="white"/>
    <circle cx="310" cy="950" r="3" fill="white"/>
  </g>

  <text x="90" y="90" fill="#F7FBFF" font-size="46" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
    블랙홀 그림자는 왜 작아질까?
  </text>
  <text x="90" y="132" fill="#B8D8E8" font-size="24" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
    논문 핵심: 양자 효과와 플라즈마가 강할수록 보이는 그림자가 더 작아진다
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="520" height="300" rx="28" fill="url(#card)" stroke="#2B5569"/>
    <text x="105" y="225" fill="#FFE7A8" font-size="28" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      1. 블랙홀 그림자란?
    </text>
    <text x="105" y="275" fill="#F7FBFF" font-size="24" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      블랙홀은 빛도 빠져나오지 못해서
    </text>
    <text x="105" y="312" fill="#F7FBFF" font-size="24" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      직접 보이지 않아요.
    </text>
    <text x="105" y="364" fill="#B8D8E8" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      대신 주변의 빛나는 가스 뒤에
    </text>
    <text x="105" y="398" fill="#B8D8E8" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      어두운 동그라미처럼 보여요.
    </text>

    <circle cx="470" cy="325" r="84" fill="#05070C"/>
    <circle cx="470" cy="325" r="112" fill="none" stroke="url(#ringGlow)" stroke-width="26"/>
    <circle cx="470" cy="325" r="145" fill="none" stroke="#FFD47A" stroke-opacity="0.18" stroke-width="4"/>
    <text x="430" y="333" fill="#F7FBFF" font-size="26" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      그림자
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="620" y="170" width="420" height="300" rx="28" fill="url(#card)" stroke="#2B5569"/>
    <text x="655" y="225" fill="#FFE7A8" font-size="28" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      2. 양자 효과
    </text>
    <text x="655" y="275" fill="#F7FBFF" font-size="23" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      블랙홀 아주 가까운 곳에서는
    </text>
    <text x="655" y="309" fill="#F7FBFF" font-size="23" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      중력이 조금 부드러워질 수 있어요.
    </text>
    <text x="655" y="366" fill="#B8D8E8" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      논문에서는 이 세기를
    </text>
    <text x="655" y="400" fill="#7CE0CC" font-size="28" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      ω̃(오메가 보정)
    </text>
    <text x="865" y="400" fill="#B8D8E8" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      으로 표시했어요.
    </text>

    <path d="M893 255C929 279 945 328 924 370C904 409 859 426 818 410" stroke="#7CE0CC" stroke-width="8" stroke-linecap="round"/>
    <path d="M818 410L841 411L830 390" fill="#7CE0CC"/>
    <text x="800" y="455" fill="#7CE0CC" font-size="24" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      ω̃ ↑  →  그림자 ↓
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1070" y="170" width="460" height="300" rx="28" fill="url(#card)" stroke="#2B5569"/>
    <text x="1105" y="225" fill="#FFE7A8" font-size="28" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      3. 플라즈마
    </text>
    <text x="1105" y="275" fill="#F7FBFF" font-size="23" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      블랙홀 주위의 뜨거운 우주 가스예요.
    </text>
    <text x="1105" y="309" fill="#F7FBFF" font-size="23" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      빛이 이 안개를 지나며 조금 휘어요.
    </text>
    <circle cx="1360" cy="355" r="34" fill="#D8F4FF" fill-opacity="0.18"/>
    <circle cx="1415" cy="320" r="22" fill="#D8F4FF" fill-opacity="0.15"/>
    <circle cx="1450" cy="375" r="28" fill="#D8F4FF" fill-opacity="0.14"/>
    <circle cx="1290" cy="312" r="18" fill="#D8F4FF" fill-opacity="0.14"/>
    <path d="M1170 397C1220 353 1274 338 1336 342" stroke="#B6ECFF" stroke-width="7" stroke-linecap="round"/>
    <path d="M1336 342L1317 355L1316 332" fill="#B6ECFF"/>
    <text x="1105" y="420" fill="#7AC6FF" font-size="24" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      플라즈마 ↑  →  그림자 ↓
    </text>
  </g>

  <g filter="url(#shadow)">
    <rect x="70" y="520" width="980" height="390" rx="28" fill="url(#card)" stroke="#2B5569"/>
    <text x="105" y="575" fill="#FFE7A8" font-size="30" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      4. 네 가지 상황 비교
    </text>
    <text x="105" y="615" fill="#B8D8E8" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      바깥 고리가 클수록, 멀리서 보이는 블랙홀 그림자가 큰 경우예요.
    </text>

    <g transform="translate(200 740)">
      <circle cx="0" cy="0" r="48" fill="#04060A"/>
      <circle cx="0" cy="0" r="86" fill="none" stroke="#FFD47A" stroke-width="18"/>
      <text x="-110" y="130" fill="#F7FBFF" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
        1위 일반 + 진공
      </text>
      <text x="-78" y="160" fill="#7CE0CC" font-size="20" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
        가장 큼
      </text>
    </g>

    <g transform="translate(440 740)">
      <circle cx="0" cy="0" r="48" fill="#04060A"/>
      <circle cx="0" cy="0" r="74" fill="none" stroke="#FFB85C" stroke-width="18"/>
      <circle cx="18" cy="-58" r="10" fill="#D8F4FF" fill-opacity="0.16"/>
      <circle cx="-34" cy="-70" r="12" fill="#D8F4FF" fill-opacity="0.13"/>
      <text x="-102" y="130" fill="#F7FBFF" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
        2위 일반 + 플라즈마
      </text>
      <text x="-58" y="160" fill="#7AC6FF" font-size="20" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
        조금 작음
      </text>
    </g>

    <g transform="translate(680 740)">
      <circle cx="0" cy="0" r="48" fill="#04060A"/>
      <circle cx="0" cy="0" r="66" fill="none" stroke="#F49D4E" stroke-width="18"/>
      <text x="-102" y="130" fill="#F7FBFF" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
        3위 양자 + 진공
      </text>
      <text x="-44" y="160" fill="#7CE0CC" font-size="20" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
        더 작음
      </text>
    </g>

    <g transform="translate(920 740)">
      <circle cx="0" cy="0" r="48" fill="#04060A"/>
      <circle cx="0" cy="0" r="56" fill="none" stroke="#E07B39" stroke-width="18"/>
      <circle cx="16" cy="-50" r="11" fill="#D8F4FF" fill-opacity="0.16"/>
      <circle cx="-30" cy="-58" r="12" fill="#D8F4FF" fill-opacity="0.13"/>
      <text x="-102" y="130" fill="#F7FBFF" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
        4위 양자 + 플라즈마
      </text>
      <text x="-48" y="160" fill="#FF9E6D" font-size="20" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
        가장 작음
      </text>
    </g>
  </g>

  <g filter="url(#shadow)">
    <rect x="1080" y="520" width="450" height="390" rx="28" fill="url(#card)" stroke="#2B5569"/>
    <text x="1115" y="575" fill="#FFE7A8" font-size="30" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      5. 왜 중요할까?
    </text>
    <text x="1115" y="635" fill="#F7FBFF" font-size="23" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      EHT가 실제로 본 블랙홀 그림자 크기와
    </text>
    <text x="1115" y="669" fill="#F7FBFF" font-size="23" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      논문 계산이 잘 맞아떨어졌어요.
    </text>
    <text x="1115" y="731" fill="#B8D8E8" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      다만 문제도 있어요.
    </text>
    <text x="1115" y="765" fill="#B8D8E8" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      그림자가 작아졌을 때,
    </text>
    <text x="1115" y="799" fill="#B8D8E8" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      원인이 양자 효과인지 플라즈마인지
    </text>
    <text x="1115" y="833" fill="#B8D8E8" font-size="22" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      지금 망원경만으로는 구분이 어려워요.
    </text>
    <text x="1115" y="880" fill="#7CE0CC" font-size="24" font-weight="700" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
      더 좋은 미래 망원경이 필요!
    </text>
  </g>

  <text x="90" y="955" fill="#7FA5B8" font-size="20" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
    Source summary: "Shadows of Bonanno-Reuter Black Holes in Plasma Medium" (2025) easy explanation
  </text>
</svg>
