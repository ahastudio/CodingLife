<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <!-- 블랙홀 그라데이션 -->
    <radialGradient id="bhGrad1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="55%" stop-color="#0d0020"/>
      <stop offset="100%" stop-color="#2a0040"/>
    </radialGradient>
    <radialGradient id="bhGrad2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="55%" stop-color="#001520"/>
      <stop offset="100%" stop-color="#002040"/>
    </radialGradient>
    <!-- 플라즈마 글로우 그라데이션 (오른쪽 블랙홀) -->
    <radialGradient id="plasmaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="40%" stop-color="#00d4ff" stop-opacity="0"/>
      <stop offset="65%" stop-color="#00d4ff" stop-opacity="0.08"/>
      <stop offset="80%" stop-color="#0088ff" stop-opacity="0.2"/>
      <stop offset="90%" stop-color="#0044ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
    </radialGradient>
    <!-- 플라즈마 구름 그라데이션 -->
    <radialGradient id="plasmaCloud1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00d4ff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plasmaCloud2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0088ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0088ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="plasmaCloud3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00ffaa" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00ffaa" stop-opacity="0"/>
    </radialGradient>
    <!-- 글로우 필터 -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="plasmaFilter" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <!-- 마커 -->
    <marker id="arrowOrange" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
    <marker id="arrowOrange2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff6b35"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#ff6b35"/>
    </marker>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="white"/>
    </marker>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="800" fill="#05050f"/>

  <!-- 별들 -->
  <circle cx="30" cy="25" r="1.0" fill="white" opacity="0.8"/>
  <circle cx="95" cy="65" r="0.7" fill="#ffd700" opacity="0.7"/>
  <circle cx="175" cy="30" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="260" cy="80" r="0.8" fill="white" opacity="0.9"/>
  <circle cx="320" cy="18" r="1.0" fill="#ffd700" opacity="0.7"/>
  <circle cx="420" cy="55" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="510" cy="30" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="620" cy="70" r="0.8" fill="#ffd700" opacity="0.9"/>
  <circle cx="700" cy="20" r="1.3" fill="white" opacity="0.7"/>
  <circle cx="780" cy="45" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="870" cy="25" r="1.0" fill="#ffd700" opacity="0.6"/>
  <circle cx="960" cy="60" r="1.1" fill="white" opacity="0.9"/>
  <circle cx="1040" cy="15" r="0.8" fill="white" opacity="0.7"/>
  <circle cx="1120" cy="50" r="1.2" fill="#ffd700" opacity="0.8"/>
  <circle cx="1170" cy="25" r="0.9" fill="white" opacity="0.6"/>
  <circle cx="40" cy="160" r="0.9" fill="white" opacity="0.7"/>
  <circle cx="80" cy="280" r="1.1" fill="#ffd700" opacity="0.6"/>
  <circle cx="35" cy="400" r="0.8" fill="white" opacity="0.8"/>
  <circle cx="70" cy="520" r="1.0" fill="white" opacity="0.7"/>
  <circle cx="40" cy="650" r="0.9" fill="#ffd700" opacity="0.9"/>
  <circle cx="100" cy="750" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="1150" cy="200" r="1.0" fill="white" opacity="0.8"/>
  <circle cx="1170" cy="350" r="0.8" fill="#ffd700" opacity="0.7"/>
  <circle cx="1140" cy="500" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="1160" cy="650" r="0.9" fill="white" opacity="0.8"/>
  <circle cx="1100" cy="750" r="1.3" fill="#ffd700" opacity="0.7"/>
  <circle cx="300" cy="760" r="1.0" fill="white" opacity="0.7"/>
  <circle cx="450" cy="770" r="0.8" fill="#ffd700" opacity="0.8"/>
  <circle cx="600" cy="780" r="1.1" fill="white" opacity="0.6"/>
  <circle cx="750" cy="760" r="0.9" fill="white" opacity="0.9"/>
  <circle cx="900" cy="775" r="1.0" fill="#ffd700" opacity="0.7"/>
  <circle cx="200" cy="740" r="0.8" fill="white" opacity="0.8"/>

  <!-- 제목 -->
  <text x="600" y="48" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="30" font-weight="bold" fill="white" text-anchor="middle" filter="url(#glow)">플라즈마가 블랙홀 그림자에 미치는 영향</text>
  <text x="600" y="78" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="15" fill="#00d4ff" text-anchor="middle" opacity="0.85">블랙홀 주변의 플라즈마(이온화된 가스)는 빛의 경로를 바꿔 그림자 크기에 영향을 줍니다</text>

  <!-- ====================================================== -->
  <!-- 왼쪽 패널: 플라즈마 없는 블랙홀 -->
  <!-- ====================================================== -->
  <rect x="40" y="105" width="520" height="550" rx="18" fill="#080818" stroke="#ffd700" stroke-width="1.5" opacity="0.95"/>

  <!-- 패널 제목 -->
  <rect x="130" y="118" width="300" height="42" rx="10" fill="#1a1a00" opacity="0.9"/>
  <text x="280" y="145" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="bold" fill="#ffd700" text-anchor="middle">플라즈마 없음</text>

  <!-- 큰 그림자 영역 강조 -->
  <ellipse cx="280" cy="390" rx="155" ry="155" fill="#150025" opacity="0.3"/>

  <!-- 광자 링 글로우 (큰, 오렌지/노랑) -->
  <circle cx="280" cy="390" r="165" fill="none" stroke="#ffd700" stroke-width="8" opacity="0.25" filter="url(#strongGlow)"/>
  <circle cx="280" cy="390" r="165" fill="none" stroke="#ff6b35" stroke-width="14" opacity="0.12" filter="url(#plasmaFilter)"/>
  <!-- 광자 링 실선 -->
  <circle cx="280" cy="390" r="165" fill="none" stroke="#ffd700" stroke-width="3" opacity="0.75" filter="url(#glow)"/>
  <!-- 밝은 아랫부분 호 -->
  <path d="M 117 390 A 163 163 0 0 0 443 390" stroke="#ff6b35" stroke-width="5" fill="none" opacity="0.8" filter="url(#glow)"/>

  <!-- 블랙홀 본체 (크게) -->
  <circle cx="280" cy="390" r="138" fill="url(#bhGrad1)" filter="url(#glow)"/>
  <circle cx="280" cy="390" r="138" fill="none" stroke="#3d0060" stroke-width="6" opacity="0.5"/>

  <!-- 사건 지평선 -->
  <circle cx="280" cy="390" r="108" fill="none" stroke="#8a2be2" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.6"/>

  <!-- 크기 측정 화살표 (수평) -->
  <line x1="115" y1="556" x2="445" y2="556" stroke="#ffd700" stroke-width="2" marker-end="url(#arrowOrange)" marker-start="url(#arrowLeft)"/>
  <rect x="190" y="563" width="180" height="28" rx="6" fill="#1a1a00" opacity="0.9"/>
  <text x="280" y="582" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="15" fill="#ffd700" text-anchor="middle" font-weight="bold">그림자 크기 = 크다</text>

  <!-- 빛 경로 표시 (몇 개의 직선 화살표) -->
  <line x1="490" y1="310" x2="450" y2="340" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrowWhite)" stroke-dasharray="5,3"/>
  <line x1="490" y1="390" x2="448" y2="390" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrowWhite)" stroke-dasharray="5,3"/>
  <line x1="490" y1="470" x2="450" y2="440" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.6" marker-end="url(#arrowWhite)" stroke-dasharray="5,3"/>

  <!-- 라벨 -->
  <text x="280" y="623" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#888" text-anchor="middle">진공 상태: 빛이 그냥 굴절됨</text>
  <text x="280" y="643" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="white" text-anchor="middle">그림자가 최대 크기로 보여요</text>

  <!-- ====================================================== -->
  <!-- 오른쪽 패널: 플라즈마 있는 블랙홀 -->
  <!-- ====================================================== -->
  <rect x="640" y="105" width="520" height="550" rx="18" fill="#080818" stroke="#00d4ff" stroke-width="1.5" opacity="0.95"/>

  <!-- 패널 제목 -->
  <rect x="730" y="118" width="300" height="42" rx="10" fill="#001a2a" opacity="0.9"/>
  <text x="880" y="145" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="20" font-weight="bold" fill="#00d4ff" text-anchor="middle">플라즈마 있음</text>

  <!-- 플라즈마 구름들 (배경) -->
  <ellipse cx="880" cy="370" rx="220" ry="190" fill="url(#plasmaGlow)" filter="url(#plasmaFilter)"/>
  <ellipse cx="820" cy="340" rx="80" ry="60" fill="url(#plasmaCloud1)" filter="url(#plasmaFilter)"/>
  <ellipse cx="960" cy="350" rx="70" ry="55" fill="url(#plasmaCloud2)" filter="url(#plasmaFilter)"/>
  <ellipse cx="880" cy="450" rx="90" ry="65" fill="url(#plasmaCloud3)" filter="url(#plasmaFilter)"/>
  <ellipse cx="800" cy="430" rx="55" ry="45" fill="url(#plasmaCloud1)" filter="url(#plasmaFilter)"/>
  <ellipse cx="950" cy="420" rx="65" ry="50" fill="url(#plasmaCloud2)" filter="url(#plasmaFilter)"/>

  <!-- 플라즈마 파티클들 (작은 점) -->
  <circle cx="760" cy="310" r="2.5" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="800" cy="280" r="2.0" fill="#0088ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="840" cy="300" r="3.0" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="870" cy="270" r="2.0" fill="#00ffaa" opacity="0.7" filter="url(#glow)"/>
  <circle cx="920" cy="295" r="2.5" fill="#0088ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="960" cy="275" r="2.0" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="1000" cy="310" r="3.0" fill="#0088ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="730" cy="370" r="2.5" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="740" cy="420" r="2.0" fill="#00ffaa" opacity="0.5" filter="url(#glow)"/>
  <circle cx="760" cy="460" r="3.0" fill="#00d4ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="1010" cy="360" r="2.5" fill="#0088ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="1020" cy="420" r="2.0" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="990" cy="460" r="2.5" fill="#00ffaa" opacity="0.7" filter="url(#glow)"/>
  <circle cx="780" cy="490" r="2.0" fill="#0088ff" opacity="0.6" filter="url(#glow)"/>
  <circle cx="830" cy="510" r="3.0" fill="#00d4ff" opacity="0.5" filter="url(#glow)"/>
  <circle cx="890" cy="500" r="2.5" fill="#0088ff" opacity="0.7" filter="url(#glow)"/>
  <circle cx="950" cy="495" r="2.0" fill="#00d4ff" opacity="0.6" filter="url(#glow)"/>
  <!-- 플라즈마 파티클 흩뿌리기 (더 많이) -->
  <circle cx="810" cy="350" r="1.5" fill="#00ffaa" opacity="0.5"/>
  <circle cx="855" cy="320" r="1.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="905" cy="330" r="1.5" fill="#0088ff" opacity="0.6"/>
  <circle cx="935" cy="355" r="1.5" fill="#00ffaa" opacity="0.5"/>
  <circle cx="975" cy="340" r="1.5" fill="#00d4ff" opacity="0.4"/>
  <circle cx="770" cy="440" r="1.5" fill="#0088ff" opacity="0.5"/>
  <circle cx="985" cy="440" r="1.5" fill="#00ffaa" opacity="0.4"/>

  <!-- 광자 링 글로우 (더 작음) -->
  <circle cx="880" cy="390" r="140" fill="none" stroke="#ffd700" stroke-width="7" opacity="0.2" filter="url(#strongGlow)"/>
  <circle cx="880" cy="390" r="140" fill="none" stroke="#ff6b35" stroke-width="12" opacity="0.1" filter="url(#plasmaFilter)"/>
  <!-- 광자 링 실선 -->
  <circle cx="880" cy="390" r="140" fill="none" stroke="#ffd700" stroke-width="2.5" opacity="0.65" filter="url(#glow)"/>
  <path d="M 742 390 A 138 138 0 0 0 1018 390" stroke="#ff6b35" stroke-width="4" fill="none" opacity="0.7" filter="url(#glow)"/>

  <!-- 블랙홀 본체 (작게) -->
  <circle cx="880" cy="390" r="112" fill="url(#bhGrad2)" filter="url(#glow)"/>
  <circle cx="880" cy="390" r="112" fill="none" stroke="#003060" stroke-width="5" opacity="0.5"/>

  <!-- 사건 지평선 -->
  <circle cx="880" cy="390" r="88" fill="none" stroke="#8a2be2" stroke-width="1.5" stroke-dasharray="8,5" opacity="0.5"/>

  <!-- 크기 측정 화살표 -->
  <line x1="742" y1="556" x2="1018" y2="556" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowOrange)" marker-start="url(#arrowLeft)"/>
  <rect x="790" y="563" width="180" height="28" rx="6" fill="#001a2a" opacity="0.9"/>
  <text x="880" y="582" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="15" fill="#00d4ff" text-anchor="middle" font-weight="bold">그림자 크기 = 작다</text>

  <!-- 빛 경로가 플라즈마에 의해 더 많이 굴절되는 표시 -->
  <path d="M 1090 330 C 1060 340, 1040 360, 1022 375" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.7" marker-end="url(#arrowWhite)" stroke-dasharray="5,3"/>
  <path d="M 1090 390 C 1055 390, 1038 390, 1022 390" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.7" marker-end="url(#arrowWhite)" stroke-dasharray="5,3"/>
  <path d="M 1090 450 C 1060 440, 1040 420, 1022 405" stroke="#00d4ff" stroke-width="1.5" fill="none" opacity="0.7" marker-end="url(#arrowWhite)" stroke-dasharray="5,3"/>

  <!-- 플라즈마 라벨 -->
  <rect x="660" y="320" width="80" height="28" rx="5" fill="#001a2a" opacity="0.85"/>
  <text x="700" y="339" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="13" fill="#00d4ff" text-anchor="middle">플라즈마</text>
  <line x1="740" y1="334" x2="760" y2="355" stroke="#00d4ff" stroke-width="1" stroke-dasharray="3,2" opacity="0.7"/>

  <text x="880" y="623" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#888" text-anchor="middle">플라즈마가 빛의 굴절률을 높여 더 가까이 굴절</text>
  <text x="880" y="643" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="white" text-anchor="middle">그림자가 더 작게 보여요</text>

  <!-- ====================================================== -->
  <!-- 가운데 비교 화살표 영역 -->
  <!-- ====================================================== -->
  <!-- 화살표들 -->
  <text x="600" y="385" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="38" fill="#ff6b35" text-anchor="middle" font-weight="bold" filter="url(#glow)">→</text>

  <!-- ====================================================== -->
  <!-- 하단 설명 -->
  <!-- ====================================================== -->
  <rect x="80" y="680" width="1040" height="100" rx="14" fill="#050520" stroke="#ffd700" stroke-width="1" opacity="0.95"/>

  <!-- 아이콘 표시 -->
  <circle cx="140" cy="730" r="20" fill="#ffd700" opacity="0.15"/>
  <text x="140" y="736" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="22" fill="#ffd700" text-anchor="middle">💡</text>

  <text x="600" y="705" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="16" font-weight="bold" fill="#ffd700" text-anchor="middle">핵심 요약</text>
  <text x="600" y="727" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="white" text-anchor="middle">플라즈마(이온화된 가스)는 전자기파인 빛의 속도를 느리게 만들어요.</text>
  <text x="600" y="748" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="white" text-anchor="middle">그래서 빛이 블랙홀 더 가까이에서 궤도를 만들고, 그림자가 더 작아집니다.</text>
  <text x="600" y="769" font-family="'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif" font-size="14" fill="#00d4ff" text-anchor="middle">플라즈마 밀도가 높을수록 → 그림자가 더 작아져요!</text>
</svg>
